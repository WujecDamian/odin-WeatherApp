<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  <script defer src="main.js"></script></head>
  <body>
    <nav>
      <h1>weather app</h1>
      <section class="nav__wrap">
        <input type="text" name="weather-city" id="weather-city" class="city" />
        <button class="search__button">Search</button>
      </section>
      <button class="unit__toggle">C/F</button>
    </nav>
    <main>
      <section class="weather__card--big">
        <img
          src="e30f14e717714ef08a0d.svg"
          alt="icon of weather"
          class="weather__icon"
          width="50px"
        />
        <h2 class=""><span class="weather__city-name"></span></h2>
        <span class="weather__temperature"></span>
        <h4 class="">‎ <span class="weather__description"></span></h4>
        <p class="">Feels like: <span class="weather__feelslike"></span></p>
        <p class="">Sunset at: <span class="weather__sunset"></span></p>
        <p class=""><span class="weather__forecast--description"></span></p>
        <section class="weather__cards--small"></section>
      </section>
    </main>
  </body>
</html>
